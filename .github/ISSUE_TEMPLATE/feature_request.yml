name: Sugerir recurso
description: Proponha uma melhoria compatível com o uso autorizado.
title: "[Recurso]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema a resolver
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Solução proposta
    validations:
      required: true
  - type: checkboxes
    id: authorization
    attributes:
      label: Uso autorizado
      options:
        - label: A proposta não contorna DRM, autenticação, paywall ou restrições da fonte.
          required: true

